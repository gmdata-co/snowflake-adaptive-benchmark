version: 2

models:
  - name: adaptive_vs_gen1_summary
    description: >
      Per-scenario summary comparing Snowflake adaptive warehouses against
      gen1 warehouses. One row per (scenario, warehouse_type, size, qtm,
      idle_policy) combination. Feeds the visualization app.
    columns:
      - name: run_id
        description: "Unique identifier for the benchmark run"
        data_tests:
          - not_null

      - name: scenario
        description: "Benchmark scenario"
        data_tests:
          - not_null

      - name: warehouse_type
        description: "Warehouse generation: 'gen1' or 'adaptive'"
        data_tests:
          - not_null

      - name: idle_policy
        description: "Idle policy: wait_for_suspend | immediate_drop | n_a"

      - name: total_wall_clock_seconds
        description: "Total wall clock time for the scenario"

      - name: total_cost_usd
        description: "Total cost in USD for the scenario"

      - name: query_count
        description: "Number of queries in the scenario"
