version: 2

sources:
  - name: main
    description: "Benchmark results database schema"
    schema: main
    tables:
      - name: snowflake_results
        description: "Raw Snowflake TPC-H benchmark query results"
        columns:
          - name: run_id
            description: "Unique identifier for the benchmark run"
          - name: scenario
            description: "Benchmark scenario (sequential, concurrent, dml)"
          - name: warehouse_type
            description: "Warehouse generation: 'gen1' or 'adaptive'"
          - name: qtm
            description: "QUERY_THROUGHPUT_MULTIPLIER (adaptive only; NULL for gen1)"
          - name: idle_policy
            description: "Run-time idle policy: wait_for_suspend | immediate_drop | n_a (adaptive). Drives the dashboard tail/no-tail toggle."
          - name: query_num
            description: "TPC-H query number (1-22)"
          - name: execution_time_sec
            description: "Query execution time in seconds"

      - name: run_metadata
        description: "Metadata about benchmark runs including timing per warehouse"
        columns:
          - name: run_id
            description: "Unique identifier for the benchmark run"
          - name: platform
            description: "Platform (snowflake)"
          - name: scenario
            description: "Benchmark scenario"
          - name: warehouse_type
            description: "Warehouse generation: 'gen1' or 'adaptive'"
          - name: warehouse_size
            description: "Warehouse size (SMALL, MEDIUM, LARGE, XLARGE)"
          - name: qtm
            description: "QUERY_THROUGHPUT_MULTIPLIER (adaptive only; NULL for gen1)"
          - name: warehouse_name
            description: "Full warehouse name/ID"
          - name: start_timestamp
            description: "When the run started"
          - name: end_timestamp
            description: "When the run ended"
          - name: total_wall_clock_seconds
            description: "Total wall clock time for the run"
