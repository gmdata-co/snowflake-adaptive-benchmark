name: 'benchmark_transformations'
version: '1.0.0'
config-version: 2

# This setting configures which "profile" dbt uses for this project.
profile: 'benchmark_transformations'

# These configurations specify where dbt should look for different types of files.
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

# Variables for filtering
vars:
  # Filter run_summary to specific run_ids. Set to empty list [] for all runs.
  # Example: ['035', '038']
  run_ids: []

# Configuring models
#
# The legacy cross-platform (Snowflake vs Databricks) comparison models depend on
# sources that the current adaptive-vs-gen1 pipeline does not generate
# (snowflake_wh_usage, databricks_wh_usage, databricks_pricing, run_control).
# They are kept on disk for future re-enablement (e.g., if Databricks
# benchmarking is reactivated) but disabled here so `dbt build` succeeds today.
models:
  benchmark_transformations:
    +materialized: view

    base:
      +materialized: view

    intermediate:
      # All intermediates reference removed sources — disabled until DBX side is rewired.
      +enabled: false

    marts:
      +materialized: view
      # New active model: adaptive_vs_gen1_summary (used by the chart).
      # Everything below is the legacy cross-platform layer — disabled.
      platform_comparison_latest:
        +enabled: false
      platform_comparison_normal:
        +enabled: false
      platform_comparison_coldstart:
        +enabled: false
      platform_comparison_all_runs:
        +enabled: false
      run_summary:
        +enabled: false
      run_summary_agg:
        +enabled: false
      run_summary_by_warehouse:
        +enabled: false
      run_summary_with_implied_costs:
        +enabled: false
      ctas_summary:
        +enabled: false
      query_details:
        +enabled: false
