name: 'benchmark_transformations'
version: '1.0.0'
config-version: 2

# This setting configures which "profile" dbt uses for this project.
profile: 'benchmark_transformations'

# These configurations specify where dbt should look for different types of files.
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

# Configuring models
#
# The Snowflake adaptive-vs-gen1 pipeline: base_snowflake_results feeds the
# adaptive_vs_gen1_summary mart, which feeds the visualization app.
models:
  benchmark_transformations:
    +materialized: view

    base:
      +materialized: view

    marts:
      +materialized: view
